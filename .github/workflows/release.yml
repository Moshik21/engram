name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  images:
    name: Publish Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute image namespace
        id: meta
        run: echo "owner_lower=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lower }}/engram-server:${{ github.ref_name }}
            ghcr.io/${{ steps.meta.outputs.owner_lower }}/engram-server:latest

      - name: Build and push dashboard image
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          file: dashboard/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lower }}/engram-dashboard:${{ github.ref_name }}
            ghcr.io/${{ steps.meta.outputs.owner_lower }}/engram-dashboard:latest

  native-wheels:
    name: Build Helix Native Wheels
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            manylinux: "2_28"
            artifact: linux-x86_64
          - os: ubuntu-latest
            target: aarch64
            manylinux: "2_28"
            artifact: linux-aarch64
            # openssl-sys needs TARGET-arch OpenSSL in the cross container;
            # non-blocking until vendored-openssl or target libs land
            # (2026-07-18). macOS pair + linux-x86_64 ship regardless.
            experimental: true
          # Both mac targets cross-compile from the arm64 runner; macos-13
          # (Intel) runners are being retired and queue indefinitely.
          - os: macos-14
            target: x86_64-apple-darwin
            manylinux: "off"
            artifact: macos-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            manylinux: "off"
            artifact: macos-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # helix-db's build script compiles protobuf definitions and needs the
      # protoc binary on the build host (or inside the manylinux container).
      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Build helix-native wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: native/helix-repo/helix-python
          command: build
          args: --release --out dist/helix-native
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          before-script-linux: |
            # Native manylinux_2_28 image is AlmaLinux (dnf); the aarch64
            # cross image is Debian-based (apt). openssl-sys additionally
            # needs headers on the native image.
            if command -v dnf >/dev/null 2>&1; then
              dnf install -y protobuf-compiler openssl-devel perl-IPC-Cmd
            elif command -v apt-get >/dev/null 2>&1; then
              apt-get update && apt-get install -y protobuf-compiler
            fi

      - name: Upload helix-native wheel
        uses: actions/upload-artifact@v4
        with:
          name: helix-native-wheel-${{ matrix.artifact }}
          path: native/helix-repo/helix-python/dist/helix-native/*.whl

  bundle:
    name: Build Release Assets
    runs-on: ubuntu-latest
    needs: [images, native-wheels]
    steps:
      - uses: actions/checkout@v4

      - name: Compute image namespace
        id: meta
        run: echo "owner_lower=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Download helix-native wheels
        uses: actions/download-artifact@v4
        with:
          pattern: helix-native-wheel-*
          path: dist/native-wheels
          merge-multiple: true

      - name: Build install bundle
        run: |
          python3 scripts/build_install_bundle.py \
            --version "${GITHUB_REF_NAME}" \
            --output-dir dist/release \
            --image-namespace "ghcr.io/${{ steps.meta.outputs.owner_lower }}"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/engram-install-bundle.tar.gz
            dist/release/engram-install-bundle.sha256
            dist/release/engram-brain-skill.tar.gz
            dist/release/engram-brain-skill.sha256
            dist/release/engram-memory-skill.tar.gz
            dist/release/engram-memory-skill.sha256
            dist/native-wheels/*.whl
