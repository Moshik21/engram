<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" role="img" aria-label="Harness-mediated memory: three layers and tiered loop">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0b16"/>
      <stop offset="100%" stop-color="#12122a"/>
    </linearGradient>
    <linearGradient id="scanGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <style>
      @media (prefers-reduced-motion: reduce) {
        .blink, .scan { animation: none !important; }
      }
      .blink { animation: blink 2.4s ease-in-out infinite; }
      .blink-b { animation-delay: 0.8s; }
      .blink-c { animation-delay: 1.6s; }
      @keyframes blink {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
      .scan { animation: scan 4s linear infinite; }
      @keyframes scan {
        0% { transform: translateX(-120px); opacity: 0; }
        15% { opacity: 0.8; }
        85% { opacity: 0.8; }
        100% { transform: translateX(960px); opacity: 0; }
      }
    </style>
  </defs>

  <rect width="960" height="400" rx="14" fill="url(#bg2)" stroke="#2e2e4a"/>

  <text x="480" y="36" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="3" fill="#94a3b8">HOW MEMORY COMPOUNDS</text>

  <!-- Three layers -->
  <g font-family="ui-sans-serif, system-ui, sans-serif">
    <!-- Harness -->
    <rect x="40" y="60" width="880" height="88" rx="12" fill="#0f172a" stroke="#334155"/>
    <rect x="40" y="60" width="6" height="88" rx="3" fill="#22d3ee"/>
    <text x="68" y="88" font-size="12" font-weight="700" fill="#67e8f9">HARNESS</text>
    <text x="68" y="108" font-size="11" fill="#94a3b8">Session inject · auto-observe hooks · offline queue</text>
    <text x="68" y="128" font-size="10" fill="#64748b">AXI home packet · UserPromptSubmit → POST /auto-observe · zero agent tokens</text>
    <circle class="blink" cx="860" cy="104" r="6" fill="#22d3ee"/>

    <!-- Agent -->
    <rect x="40" y="164" width="880" height="88" rx="12" fill="#0f172a" stroke="#334155"/>
    <rect x="40" y="164" width="6" height="88" rx="3" fill="#a78bfa"/>
    <text x="68" y="192" font-size="12" font-weight="700" fill="#c4b5fd">AGENT</text>
    <text x="68" y="212" font-size="11" fill="#94a3b8">get_context once · recall when cues fire · remember high-signal</text>
    <text x="68" y="232" font-size="10" fill="#64748b">No per-turn observe when harness capture is active — judgment only</text>
    <circle class="blink blink-b" cx="860" cy="208" r="6" fill="#a78bfa"/>

    <!-- Brain -->
    <rect x="40" y="268" width="880" height="88" rx="12" fill="#0f172a" stroke="#334155"/>
    <rect x="40" y="268" width="6" height="88" rx="3" fill="#34d399"/>
    <text x="68" y="296" font-size="12" font-weight="700" fill="#6ee7b7">BRAIN</text>
    <text x="68" y="316" font-size="11" fill="#94a3b8">Triage · project · 16-phase consolidation · dream associations</text>
    <text x="68" y="336" font-size="10" fill="#64748b">Episodic → transitional → semantic maturation in background</text>
    <circle class="blink blink-c" cx="860" cy="312" r="6" fill="#34d399"/>
  </g>

  <!-- Tier bar -->
  <g transform="translate(40, 372)" font-family="ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#64748b">
    <text x="0" y="0">HOT</text>
    <rect x="28" y="-10" width="120" height="6" rx="3" fill="#f97316" opacity="0.8"/>
    <text x="160" y="0">WARM</text>
    <rect x="200" y="-10" width="200" height="6" rx="3" fill="#eab308" opacity="0.7"/>
    <text x="412" y="0">COLD</text>
    <rect x="450" y="-10" width="180" height="6" rx="3" fill="#3b82f6" opacity="0.7"/>
    <text x="642" y="0">BACKGROUND</text>
    <rect x="730" y="-10" width="150" height="6" rx="3" fill="#64748b" opacity="0.6"/>
  </g>

  <!-- Scan line -->
  <rect class="scan" x="0" y="58" width="120" height="300" fill="url(#scanGrad)" opacity="0.15"/>
</svg>