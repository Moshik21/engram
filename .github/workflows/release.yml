name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  images:
    name: Publish Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute image namespace
        id: meta
        run: echo "owner_lower=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lower }}/engram-server:${{ github.ref_name }}
            ghcr.io/${{ steps.meta.outputs.owner_lower }}/engram-server:latest

      - name: Build and push dashboard image
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          file: dashboard/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lower }}/engram-dashboard:${{ github.ref_name }}
            ghcr.io/${{ steps.meta.outputs.owner_lower }}/engram-dashboard:latest

  bundle:
    name: Build Release Assets
    runs-on: ubuntu-latest
    needs: images
    steps:
      - uses: actions/checkout@v4

      - name: Compute image namespace
        id: meta
        run: echo "owner_lower=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build install bundle
        run: |
          python3 scripts/build_install_bundle.py \
            --version "${GITHUB_REF_NAME}" \
            --output-dir dist/release \
            --image-namespace "ghcr.io/${{ steps.meta.outputs.owner_lower }}"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/engram-install-bundle.tar.gz
            dist/release/engram-install-bundle.sha256
            dist/release/engram-memory-skill.tar.gz
            dist/release/engram-memory-skill.sha256
