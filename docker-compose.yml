name: engram

services:
  falkordb:
    image: falkordb/falkordb:v4.4.1
    container_name: engram-falkordb
    restart: unless-stopped
    ports:
      - "${ENGRAM_FALKORDB_PORT:-6380}:6379"
    environment:
      - REDIS_ARGS=--requirepass ${ENGRAM_FALKORDB_PASSWORD:-engram_dev} --appendonly yes --appendfsync everysec
    volumes:
      - engram_falkordb_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${ENGRAM_FALKORDB_PASSWORD:-engram_dev}", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    networks:
      - engram-net

  redis:
    image: redis/redis-stack-server:latest
    container_name: engram-redis
    restart: unless-stopped
    ports:
      - "${ENGRAM_REDIS_PORT:-6381}:6379"
    environment:
      - REDIS_ARGS=--requirepass ${ENGRAM_REDIS_PASSWORD:-engram_dev} --appendonly yes --appendfsync everysec --maxmemory 200mb --maxmemory-policy noeviction
    volumes:
      - engram_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${ENGRAM_REDIS_PASSWORD:-engram_dev}", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - engram-net

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: engram-server
    restart: unless-stopped
    ports:
      - "8100:8100"
    depends_on:
      falkordb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - ENGRAM_MODE=full
      - ENGRAM_FALKORDB__HOST=falkordb
      - ENGRAM_FALKORDB__PORT=6379
      - ENGRAM_FALKORDB__PASSWORD=${ENGRAM_FALKORDB_PASSWORD:-engram_dev}
      - ENGRAM_REDIS__URL=redis://:${ENGRAM_REDIS_PASSWORD:-engram_dev}@redis:6379/0
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - VOYAGE_API_KEY=${VOYAGE_API_KEY:-}
      - ENGRAM_AUTH__ENABLED=${ENGRAM_AUTH_ENABLED:-false}
      - ENGRAM_AUTH__BEARER_TOKEN=${ENGRAM_AUTH_BEARER_TOKEN:-}
      - ENGRAM_ENCRYPTION__ENABLED=${ENGRAM_ENCRYPTION_ENABLED:-false}
      - ENGRAM_ENCRYPTION__MASTER_KEY=${ENGRAM_ENCRYPTION_MASTER_KEY:-}
      - ENGRAM_ACTIVATION__CONSOLIDATION_PROFILE=${ENGRAM_ACTIVATION__CONSOLIDATION_PROFILE:-standard}
      - ENGRAM_ACTIVATION__INTEGRATION_PROFILE=${ENGRAM_ACTIVATION__INTEGRATION_PROFILE:-rework}
      - ENGRAM_ACTIVATION__WORKER_ENABLED=${ENGRAM_ACTIVATION__WORKER_ENABLED:-true}
    volumes:
      - engram_server_data:/home/engram/.engram
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    networks:
      - engram-net

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: engram-dashboard
    restart: unless-stopped
    ports:
      - "3000:8080"
    depends_on:
      server:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    networks:
      - engram-net

networks:
  engram-net:
    driver: bridge

volumes:
  engram_falkordb_data:
  engram_redis_data:
  engram_server_data:
