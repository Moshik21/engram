# Engram Redis configuration
# Password is set via --requirepass in docker-compose command override

# Persistence — AOF + RDB snapshots
appendonly yes
appendfsync everysec

save 900 1
save 300 10
save 60 10000

# Memory management
# Activation state must NOT be silently evicted
maxmemory 200mb
maxmemory-policy noeviction

# Networking
tcp-keepalive 60
timeout 0

# Logging
loglevel notice
