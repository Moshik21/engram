app = "engram-api"
primary_region = "iad"

[build]
  dockerfile = "server/Dockerfile"

[env]
  ENGRAM_MODE = "full"
  ENGRAM_SERVER__HOST = "0.0.0.0"
  ENGRAM_SERVER__PORT = "8100"

[http_service]
  internal_port = 8100
  force_https = true
  auto_stop_machines = false  # Keep warm for WebSocket connections
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
