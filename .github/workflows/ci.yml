name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Add swap (guard against runner OOM eviction)
        run: |
          sudo fallocate -l 4G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h

      - name: Run tests
        # -q not -v: three consecutive runs were externally canceled ~5min in
        # with zero test failures — runner pressure, not code. Quiet output +
        # swap keep the job under the eviction threshold.
        run: uv run pytest tests/ -q --tb=short -m "not requires_docker and not requires_helix"
        env:
          ENGRAM_MODE: lite

  continuity:
    name: Continuity golden path
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Continuity suite (product metric, not LongMemEval)
        run: |
          uv run pytest tests/test_continuity_golden_path.py tests/test_durable_entity_rescue.py tests/test_durable_context_pack.py tests/test_promotion_policy.py tests/test_remember_committed_facts.py tests/test_session_promote_nudge_hook.py tests/test_mcp_surface.py -v --tb=short
          uv run engram continuity --smoke
          uv run engram doctor --skip-server --no-lifecycle --no-smoke --require-golden-loop --format markdown || true
        env:
          ENGRAM_MODE: lite
          ENGRAM_MCP_SURFACE: public

  native-continuity:
    name: Native Helix continuity
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint
    # Job always reports honest outcome: skip (exit 0 with reason) when native
    # is unavailable; hard-fail when native is available and continuity fails.
    # No continue-on-error — that greened failed native runs after import success.
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Probe helix-native import
        id: native
        run: |
          if uv run python -c "import helix_native; print('ok')"; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "helix_native import OK"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::helix_native not installed; native continuity SKIP (not a green-wash of a broken native path)"
          fi

      - name: Continuity + doctor golden-loop on native (hard gate)
        if: steps.native.outputs.available == 'true'
        run: |
          set -euo pipefail
          DATA_DIR="${RUNNER_TEMP}/engram-native-ci"
          mkdir -p "$DATA_DIR"
          export ENGRAM_MODE=helix
          export ENGRAM_HELIX__TRANSPORT=native
          export ENGRAM_HELIX__DATA_DIR="$DATA_DIR"
          export ENGRAM_MCP_SURFACE=public
          # Continuity smoke uses disposable lite storage by design; still run
          # as product metric. Doctor resolves helix mode against native data-dir.
          uv run engram continuity --smoke
          uv run engram doctor --mode helix --helix-data-dir "$DATA_DIR" \
            --skip-server --require-golden-loop --format markdown
        env:
          ENGRAM_MODE: helix
          ENGRAM_HELIX__TRANSPORT: native
          ENGRAM_MCP_SURFACE: public

      - name: Record skip when native unavailable
        if: steps.native.outputs.available != 'true'
        run: |
          echo "SKIP: helix_native unavailable on runner — native continuity not executed"
          echo "Install helix-native wheel to hard-gate this job."
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          # Pin to packageManager in dashboard/package.json. Using "latest"
          # (pnpm 10+/11) fails with ERR_PNPM_IGNORED_BUILDS unless allowBuilds
          # is configured (see dashboard/pnpm-workspace.yaml).
          version: "9.15.0"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  full-mode:
    name: Full Mode Docker
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        working-directory: server
        run: uv sync --frozen --dev

      - name: Start source-built full stack
        run: docker compose up -d --build

      - name: Wait for health
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8100/health >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          exit 1

      - name: REST golden-loop smoke against the running stack
        # Every probe echoes its status + body head so a failure names itself.
        run: |
          set -uo pipefail
          fail=0
          probe() {
            local method="$1" path="$2" data="${3:-}"
            local code
            if [ -n "$data" ]; then
              code=$(curl -s -o /tmp/resp.json -w '%{http_code}' -X "$method" \
                -H 'Content-Type: application/json' -d "$data" "http://127.0.0.1:8100$path")
            else
              code=$(curl -s -o /tmp/resp.json -w '%{http_code}' "http://127.0.0.1:8100$path")
            fi
            echo "== $method $path -> $code"
            head -c 400 /tmp/resp.json; echo
            [ "$code" = "200" ] || fail=1
          }
          probe GET /api/storage
          grep -q '"counts"' /tmp/resp.json || fail=1
          curl -s http://127.0.0.1:8100/openapi.json -o /tmp/oa.json
          python3 -c "import json; paths=json.load(open('/tmp/oa.json'))['paths']; print(len(paths),'routes'); missing=[p for p in ('/api/storage','/api/knowledge/observe','/api/knowledge/recall') if p not in paths]; print('missing:',missing); raise SystemExit(1 if missing else 0)" || fail=1
          probe POST /api/knowledge/observe '{"content": "Full-mode CI smoke: Engram ships a Docker compat lane.", "source": "ci-smoke"}'
          probe POST /api/knowledge/recall '{"query": "Docker compat lane", "limit": 3}'
          exit $fail

      - name: Dump route table on failure
        if: failure()
        run: |
          curl -s http://127.0.0.1:8100/openapi.json | head -c 2000 || true
          docker compose exec -T server python -c "import engram, engram.main; print(engram.__file__)" || true
          docker compose exec -T server ls /app/engram/api/ || true

      - name: Print compose logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  lite-linux:
    name: Lite Smoke Linux
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run lite installer smoke test
        run: bash scripts/test_lite_smoke.sh

  lite-macos:
    name: Lite Smoke macOS
    runs-on: macos-latest
    timeout-minutes: 30
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run lite installer smoke test
        run: bash scripts/test_lite_smoke.sh

  installer-linux:
    name: Installer Smoke Linux
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Run Linux installer smoke test
        run: bash scripts/test_installer_smoke.sh full

  installer-macos:
    name: Installer Smoke macOS
    runs-on: macos-latest
    timeout-minutes: 30
    needs: [test, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Run macOS OpenClaw installer smoke test
        run: bash scripts/test_installer_smoke.sh --skip-runtime openclaw
